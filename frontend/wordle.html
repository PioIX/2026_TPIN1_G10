<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle - Jugadores de Fútbol</title>
    <link rel="stylesheet" href="styles/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .contenedor-game {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .info-game {
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .info-game span {
            font-weight: bold;
            color: #FFD700;
        }

        /* TABLERO */
        .tablero {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .fila {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .letra-box {
            width: 50px;
            height: 50px;
            border: 2px solid #ddd;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            background: white;
            transition: all 0.3s ease;
            min-width: 50px;
        }

        .letra-box.correcta {
            background: #6aaa64;
            color: white;
            border-color: #6aaa64;
            transform: rotateX(360deg);
        }

        .letra-box.presente {
            background: #c9b458;
            color: white;
            border-color: #c9b458;
            transform: rotateY(360deg);
        }

        .letra-box.ausente {
            background: #787c7e;
            color: white;
            border-color: #787c7e;
            opacity: 0.5;
        }

        .letra-box.vacia {
            background: #e7e8ea;
        }

        /* TECLADO */
        #teclado {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .fila-teclado {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tecla {
            padding: 10px 8px;
            background: #d3d6da;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 35px;
            text-align: center;
            user-select: none;
        }

        .tecla:hover {
            background: #b0b3b8;
            transform: scale(1.05);
        }

        .tecla:active {
            transform: scale(0.95);
        }

        .tecla.grande {
            min-width: 60px;
            padding: 10px 12px;
            font-size: 12px;
        }

        .tecla.correcta {
            background: #6aaa64;
            color: white;
        }

        .tecla.presente {
            background: #c9b458;
            color: white;
        }

        .tecla.ausente {
            background: #787c7e;
            color: white;
            opacity: 0.5;
        }

        /* MENSAJES */
        .mensaje {
            color: white;
            font-size: 18px;
            font-weight: bold;
            min-height: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .mensaje.ganar {
            color: #6aaa64;
            animation: pulse 0.6s ease;
        }

        .mensaje.perder {
            color: #ff6b6b;
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .boton-nuevo {
            padding: 12px 30px;
            background: #FFD700;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .boton-nuevo:hover {
            background: #FFC700;
            transform: scale(1.05);
        }

        .boton-nuevo:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h1>⚽ WORDLE - JUGADORES DE FÚTBOL</h1>

    <div class="contenedor-game">
        <div class="info-game">
            Adivina el nombre en <span id="intentos-restantes">6</span> intentos
            <br>
            Letras: <span id="num-letras">5</span>
        </div>

        <!-- TABLERO -->
        <div class="tablero" id="tablero">
            <!-- Las filas se generarán dinámicamente -->
        </div>

        <!-- MENSAJE -->
        <div class="mensaje" id="mensaje"></div>

        <!-- TECLADO -->
        <div id="teclado">
            <div class="fila-teclado">
                <div class="tecla" data-letra="Q">Q</div>
                <div class="tecla" data-letra="W">W</div>
                <div class="tecla" data-letra="E">E</div>
                <div class="tecla" data-letra="R">R</div>
                <div class="tecla" data-letra="T">T</div>
                <div class="tecla" data-letra="Y">Y</div>
                <div class="tecla" data-letra="U">U</div>
                <div class="tecla" data-letra="I">I</div>
                <div class="tecla" data-letra="O">O</div>
                <div class="tecla" data-letra="P">P</div>
            </div>

            <div class="fila-teclado">
                <div class="tecla" data-letra="A">A</div>
                <div class="tecla" data-letra="S">S</div>
                <div class="tecla" data-letra="D">D</div>
                <div class="tecla" data-letra="F">F</div>
                <div class="tecla" data-letra="G">G</div>
                <div class="tecla" data-letra="H">H</div>
                <div class="tecla" data-letra="J">J</div>
                <div class="tecla" data-letra="K">K</div>
                <div class="tecla" data-letra="L">L</div>
            </div>

            <div class="fila-teclado">
                <div class="tecla grande" id="enter">ENTER</div>
                <div class="tecla" data-letra="Z">Z</div>
                <div class="tecla" data-letra="X">X</div>
                <div class="tecla" data-letra="C">C</div>
                <div class="tecla" data-letra="V">V</div>
                <div class="tecla" data-letra="B">B</div>
                <div class="tecla" data-letra="N">N</div>
                <div class="tecla" data-letra="M">M</div>
                <div class="tecla grande" id="bksp">BKSP</div>
            </div>
        </div>

        <button class="boton-nuevo" id="nuevo-juego">NUEVO JUEGO</button>
    </div>

    <script src="scripts/logic.js"></script>
</body>
</html>
