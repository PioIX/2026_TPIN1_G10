<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wordle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="board">

    <div class="row">
        <div class="tile">S</div>
        <div class="tile">E</div>
        <div class="tile">S</div>
        <div class="tile">K</div>
        <div class="tile yellow">O</div>
    </div>

    <div class="row">
        <div class="tile">P</div>
        <div class="tile yellow">U</div>
        <div class="tile">Y</div>
        <div class="tile yellow">O</div>
        <div class="tile">L</div>
    </div>

    <div class="row">
        <div class="tile green">M</div>
        <div class="tile">E</div>
        <div class="tile">S</div>
        <div class="tile">S</div>
        <div class="tile">I</div>
    </div>

    <div class="row">
        <div class="tile green">M</div>
        <div class="tile">A</div>
        <div class="tile">L</div>
        <div class="tile">E</div>
        <div class="tile yellow">N</div>
    </div>

    <div class="row">
        <div class="tile green">M</div>
        <div class="tile green">O</div>
        <div class="tile yellow">T</div>
        <div class="tile">T</div>
        <div class="tile">A</div>
    </div>

    <div class="row">
        <div class="tile green">M</div>
        <div class="tile green">O</div>
        <div class="tile green">U</div>
        <div class="tile green">N</div>
        <div class="tile green">T</div>
    </div>

</div>

</body>
</html>
