<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Fulbo 11</title>
    <link rel="stylesheet" href="styles/styles_registro.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<header>
    <h1>REGISTRO - FULBO 11</h1>
    <img src="img/logo.png" alt="Logo">
</header>
<hr>

<body>
    <div>
        <form class="registro">
            <input type="text" class="campo" placeholder="NOMBRE DE USUARIO:" id="nombre">
            <input type="email" class="campo" placeholder="CORREO ELECTRÓNICO:" id="email">
            <input type="password" class="campo" placeholder="CONTRASEÑA:" id="password">
            <button class="btn" type="button" onclick="registrarUsuario()">
                REGISTRARSE
            </button>
        </form>
        <a href="login.html" class="btn">
            Volver al inicio de sesión
        </a>
    </div>
</body>
<div class="modal fade" id="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button hidden type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary ocultar" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
<script src="scripts/dom.js"></script>
<script src="scripts/login_registro.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
