<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Fulbo 11</title>
   <link rel="stylesheet" href="styles/styles_registro.css">
</head>
<header>
    <h1>REGISTRO - FULBO 11</h1>
    <img src="img/logo.png" alt="Logo">
</header>
<hr>
<body>
    <div>
        <form class="registro">
            <input
                type="text"
                class="campo"
                placeholder="NOMBRE DE USUARIO:"
                id="input-username"
            >
            <input
                type="email"
                class="campo"
                placeholder="CORREO ELECTRÓNICO:"
                id="input-email"
            >
            <input
                type="password"
                class="campo"
                placeholder="CONTRASEÑA:"
                id="input-password"
            >
            <button class="btn" onclick="registrarUsuario()">
                REGISTRARSE
            </button>
        </form>
        <a href="login.html" class="btn">
            Volver al inicio de sesión
        </a>
    </div>
</body>
<script src="scripts/logic.js"></script>
<script src="scripts/login_registro.js"></script>
</html>
