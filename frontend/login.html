<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Fulbo 11</title>
    <link rel="stylesheet" href="styles/styles.login.css">

</head>
<header>
    <h1>LOGIN - FULBO 11</h1>
    <img src="img/logo.png" alt="Logo">
</header>
<hr>
<body>
    <div>
        <form class="login">

            <input type="email" class="campo" placeholder="CORREO ELECTRÓNICO:" id="email">

            <input type="password" class="campo" placeholder="CONTRASEÑA:" id="password">

            <button class="btn" onclick="loginUsuario()">
                INICIAR SESIÓN
            </button>

            <a href="registro.html" class="btn">
                REGISTRARSE
            </a>
        </form>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts/dom.js"></script>
    <script src="scripts/login_registro.js"></script>
</body>

</html>
