<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el jugador - Futbol 11</title>
    <link rel="stylesheet" href="styles/styles_adivinaeljugador.css">
</head>
<body>
    <header>
        <!-- Simulamos el estilo del logo de la imagen negra -->
        <h1><span>FUTBOL</span>11</h1>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main id="main">
        <!-- SILUETA Y DIFICULTAD -->
        <div id="contenedor-jugador-top">
            <div id="contenedor-jugador">
                <div id="silueta">?</div>
            </div>
            <div id="dificultad">⚽⚽⚽</div>
        </div>

        <!-- SECCIÓN DE PREGUNTAS -->
        <div id="caja-preguntas">
            <p id="titulo-preguntas">Haz preguntas haciendo clic abajo:</p>
            
            <div class="fila-botones">
                <div id="grupo-botones-1">
                    <button id="actual" class="btn-pill">Actual</button>
                    <button id="pasado" class="btn-pill">Pasado</button>
                </div>
            </div>

            <div class="fila-botones">
                       <div id="grupo-botones-2">
                <button id="club">Club</button>
                <button id="pais">País</button>
                <button id="posicion">Posición</button>
                <button id="edad">Edad</button>
                <button id="altura">Altura</button>
            </div>

            <div id="comparador" class="hidden">
                <button id="mayor">Mayor que</button>
                <button id="menor">Menor que</button>
                <button id="exactamente">Exactamente</button>
                <div id="slider-contenedor">
                    <input type="range" id="input-rango" min="150" max="210" value="180">
                    <span id="valor-rango">180 cm</span>
                </div>
            </div>

            <input type="text" id="input-texto" list="sugerencias" placeholder="Escribe aquí">
            <datalist id="sugerencias"></datalist>
            
            <button id="btn-preguntar">Hacer pregunta</button>
        </div>

        <p id="preguntas-restantes">Tienes 10 preguntas restantes:</p>
        <p id="mensaje-juego" class="mensaje-juego">Selecciona una categoría y haz tu primera pregunta.</p>

        <div id="caja-respuestas">
            <!-- Las respuestas se mostrarán aquí -->
        </div>

        <div id="caja-adivinar">
            <input type="text" id="input-adivinar" list="sugerencias-adivinar" placeholder="Escribe el nombre del futbolista">
            <datalist id="sugerencias-adivinar"></datalist>
            <button id="btn-adivinar">🚩</button>
        </div>

        <div id="pista" class="pista">Pulsa el icono de cámara para mostrar una pista.</div>

        <!-- BOTONES INFERIORES -->
        <div id="botones-inferiores">
            <button id="btn-marcar">🚩 Marcar respuesta</button>
            <button id="btn-camara">📸</button>
        </div>
    </main>
<script src="scripts/adivinaeljugador.js"></script>
</body>
</html>
