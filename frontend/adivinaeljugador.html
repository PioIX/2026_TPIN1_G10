<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTBOL11 - Adivina el Jugador</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <!-- HEADER -->
    <header id="header">
        <div id="marcador-left">
            <span id="marcador">1 - 0</span>
        </div>
        
        <div id="titulo">
            <h1>FUTBOL11</h1>
        </div>
        
        <div id="redes">
            <a href="#" id="instagram">📷</a>
            <a href="#" id="twitter">𝕏</a>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main id="main">
        <!-- SILUETA DEL JUGADOR -->
        <div id="contenedor-jugador">
            <div id="silueta">?</div>
            <div id="dificultad">⚽⚽⚽</div>
        </div>

        <!-- SECCIÓN DE PREGUNTAS -->
        <div id="caja-preguntas">
            <p id="titulo-preguntas">Haz preguntas haciendo clic abajo:</p>
            
            <div id="grupo-botones-1">
                <button id="actual">Actual</button>
                <button id="pasado">Pasado</button>
            </div>

            <div id="grupo-botones-2">
                <button id="club">Club</button>
                <button id="liga">Liga</button>
                <button id="pais">País</button>
                <button id="posicion">Posición</button>
                <button id="edad">Edad</button>
                <button id="altura">Altura</button>
            </div>

            <input type="text" id="input-texto" placeholder="Escribe aquí">
            
            <button id="btn-preguntar">Hacer pregunta</button>
        </div>

        <p id="preguntas-restantes">Tienes 10 preguntas restantes:</p>

        <div id="caja-respuestas">
            <!-- Las respuestas se mostrarán aquí -->
        </div>

        <!-- BOTONES INFERIORES -->
        <div id="botones-inferiores">
            <button id="btn-marcar">🚩 Marcar respuesta</button>
            <button id="btn-camara">📸</button>
        </div>
    </main>
<script src="scripts/logic.js"></script>
</body>
</html>
