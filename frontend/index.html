<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fulbo 11</title>
    <link rel="stylesheet" href="styles/styles.css">

</head>
<body>
<header>
    <h1>
        Fulbo 11
    </h1>
    <hr>
</header>
  <div>
        <form class="login">

            <input
                type="email"
                class="campo"
                placeholder="CORREO ELECTRÓNICO:"
                id="mail"
            >

            <input
                type="password"
                class="campo"
                placeholder="CONTRASEÑA:"
                id="pass"
                >

            <button class="btn" onclick="registrarse()">
                REGISTRARSE
            </button>
            <button class="btn" onclick="olvidopassword()">
                Olvide mi contraseña
            </button>

        </form>
    </div>
    </body>
